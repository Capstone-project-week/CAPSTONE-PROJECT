<div class="auth-header">
  <h2>Welcome Back</h2>
  <p>Sign in to continue to Storyverse AI</p>
</div>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
  <div *ngIf="errorMessage" class="error-banner">
    {{ errorMessage }}
  </div>
  <div class="form-group">
    <label for="email">Email Address</label>
    <div class="input-wrapper" [class.error]="f['email'].invalid && (f['email'].dirty || f['email'].touched)">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="email" formControlName="email" placeholder="name@example.com" />
    </div>
    <div *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)" class="error-message">
      Please enter a valid email address.
    </div>
  </div>

  <div class="form-group">
    <div class="label-row">
      <label for="password">Password</label>
      <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
    </div>
    <div class="input-wrapper" [class.error]="f['password'].invalid && (f['password'].dirty || f['password'].touched)">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" formControlName="password" placeholder="Enter your password" />
    </div>
    <div *ngIf="f['password'].invalid && (f['password'].dirty || f['password'].touched)" class="error-message">
      Password must be at least 6 characters.
    </div>
  </div>

  <button type="submit" class="btn-primary" [disabled]="isSubmitting">
    <span *ngIf="!isSubmitting">Sign In</span>
    <span *ngIf="isSubmitting" class="spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
  </button>
</form>

<div class="auth-footer">
  <p>Don't have an account? <a routerLink="/auth/register">Create one</a></p>
</div>
